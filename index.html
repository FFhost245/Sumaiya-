<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 15th Birthday Sumaiya! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #120024 0%, #2a0845 50%, #4a0e4e 100%);
            color: #f3e5f5;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090014;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .loader-heart {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: pulseHeart 1.2s infinite ease-in-out;
            text-shadow: 0 0 20px #ff4081;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18); }
        }

        .loader-title {
            font-size: 1.4rem;
            color: #ff80ab;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,128,171,0.5);
        }

        .bar-container {
            width: 75%;
            max-width: 250px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4081, #b388ff);
            border-radius: 20px;
            box-shadow: 0 0 8px #ff4081;
        }

        .loader-text {
            font-size: 0.8rem;
            color: #b388ff;
            opacity: 0.8;
            font-style: italic;
        }

        /* --- PARTICLES & CANVASES --- */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 35;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: rgba(255, 64, 129, 0.35);
            animation: floatUp 4.5s linear infinite;
            bottom: -40px;
            z-index: 1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) scale(0.8) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate3d(0, -115vh, 0) scale(1.2) rotate(360deg); opacity: 0; }
        }

        .app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* --- CAKE SCREEN --- */
        #cake-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            text-align: center;
        }

        .main-title {
            font-size: 2.5rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 0 0 15px #ff4081, 0 0 30px #7b2cbf;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #ff80ab;
            font-weight: 700;
            margin-bottom: 35px;
        }

        .cake-container {
            width: 200px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 45px;
            position: relative;
        }

        .candle-holder {
            display: flex;
            gap: 8px;
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        .alphabet-candle {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(#b388ff, #e8dbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            line-height: 1;
        }

        .magic-flame {
            width: 10px;
            height: 18px;
            background: radial-gradient(circle at 50% 100%, #ffffff 0%, #ffb703 30%, #ff4081 70%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #ff4081, 0 0 20px #ff80ab;
            animation: flameWobble 0.5s infinite alternate ease-in-out;
            transition: all 0.25s ease;
        }

        @keyframes flameWobble {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(3deg); }
        }

        .magic-flame.extinguished {
            opacity: 0;
            transform: translateX(-50%) scale(0) translateY(-10px);
        }
