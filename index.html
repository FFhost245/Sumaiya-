<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 15th Birthday Sumaiya! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #120024 0%, #2a0845 50%, #4a0e4e 100%);
            color: #f3e5f5;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090014;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .loader-heart {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: pulseHeart 1.2s infinite ease-in-out;
            text-shadow: 0 0 20px #ff4081;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18); }
        }

        .loader-title {
            font-size: 1.4rem;
            color: #ff80ab;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,128,171,0.5);
        }

        .bar-container {
            width: 75%;
            max-width: 250px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4081, #b388ff);
            border-radius: 20px;
            box-shadow: 0 0 8px #ff4081;
        }

        .loader-text {
            font-size: 0.8rem;
            color: #b388ff;
            opacity: 0.8;
            font-style: italic;
        }

        /* --- PARTICLES & CANVASES --- */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 35;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: rgba(255, 64, 129, 0.35);
            animation: floatUp 4.5s linear infinite;
            bottom: -40px;
            z-index: 1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) scale(0.8) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate3d(0, -115vh, 0) scale(1.2) rotate(360deg); opacity: 0; }
        }

        .app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* --- CAKE SCREEN --- */
        #cake-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            text-align: center;
        }

        .main-title {
            font-size: 2.5rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 0 0 15px #ff4081, 0 0 30px #7b2cbf;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #ff80ab;
            font-weight: 700;
            margin-bottom: 35px;
        }

        .cake-container {
            width: 200px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 45px;
            position: relative;
        }

        .candle-holder {
            display: flex;
            gap: 8px;
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        .alphabet-candle {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(#b388ff, #e8dbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            line-height: 1;
        }

        .magic-flame {
            width: 10px;
            height: 18px;
            background: radial-gradient(circle at 50% 80%, #ffffff 0%, #ffb703 30%, #ff4081 70%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #ff4081, 0 0 20px #ff80ab;
            animation: flameWobble 0.5s infinite alternate ease-in-out;
            transition: all 0.25s ease;
        }

        @keyframes flameWobble {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(3deg); }
        }

        .magic-flame.extinguished {
            opacity: 0;
            transform: translateX(-50%) scale(0) translateY(-10px);
        }

        .cake-plate {
            width: 210px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 2;
        }

        .tier-bottom {
            width: 170px;
            height: 50px;
            background: #ff85a2;
            border-radius: 8px 8px 0 0;
            position: relative;
            z-index: 3;
        }

        .tier-top {
            width: 120px;
            height: 45px;
            background: #ffb3c6;
            border-radius: 6px 6px 0 0;
            position: relative;
            z-index: 4;
        }

        .drip-frosting {
            width: 100%;
            height: 14px;
            background: #ffffff;
            border-radius: 20px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .action-banner {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 700;
            background: linear-gradient(90deg, #ff4081, #7b2cbf);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(255, 64, 129, 0.4);
            width: 90%;
            max-width: 320px;
        }

        /* --- CELEBRATION OVERLAY --- */
        #celebration-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            background: rgba(12, 0, 24, 0.94);
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            padding: 20px;
            text-align: center;
        }

        #celebration-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .celeb-text-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .celeb-main-title {
            font-size: 3.4rem;
            line-height: 1.1;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px #ff4081, 0 0 35px #ff4081, 0 0 60px #7b2cbf;
            margin-bottom: 15px;
            opacity: 0;
            transform: translate3d(0, 25px, 0);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .celeb-sub-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff80ab;
            text-shadow: 0 0 15px rgba(255,128,171,0.7);
            opacity: 0;
            transform: translate3d(0, 25px, 0);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
        }

        #celebration-screen.active .celeb-main-title,
        #celebration-screen.active .celeb-sub-title {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        /* --- QUIZ SCREEN --- */
        #quiz-screen {
            display: none;
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 38;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
        }

        .quiz-header {
            font-size: 1.3rem;
            color: #ff80ab;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quiz-progress {
            font-size: 0.85rem;
            color: #b388ff;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.15rem;
            color: #fff;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .option-btn:active {
            transform: scale(0.97);
            background: rgba(255, 64, 129, 0.2);
            border-color: #ff4081;
        }

        /* --- WISH LANTERN BOX & TRANSITIONS --- */
        #wish-screen {
            display: none;
            width: 100%;
            max-width: 360px;
            background: rgba(18, 0, 36, 0.75);
            border: 2px solid #ffb703;
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(255, 183, 3, 0.3);
            z-index: 39;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .absorb-wish {
            opacity: 0 !important;
            transform: scale(0.1) translate3d(0, -100px, 0) !important;
            pointer-events: none;
        }

        .wish-title {
            font-size: 1.4rem;
            color: #ffb703;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.4);
        }

        .wish-subtitle {
            font-size: 0.95rem;
            color: #e8dbff;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .wish-input {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 183, 3, 0.4);
            border-radius: 14px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .wish-input:focus {
            border-color: #ffb703;
            background: rgba(255, 255, 255, 0.12);
        }

        .wish-submit-btn {
            background: linear-gradient(90deg, #ffb703, #ff4081);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 183, 3, 0.3);
            width: 100%;
            transition: transform 0.2s ease;
        }

        .wish-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .wish-submit-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        /* --- SWEETNESS SLIDER SCREEN --- */
        #slider-screen {
            display: none;
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 38;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
        }

        .slider-title {
            font-size: 1.25rem;
            color: #fff;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .love-gauge-container {
            position: relative;
            margin: 30px 0;
            padding: 10px 0;
        }

        .love-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            transition: background 0.3s ease;
        }

        .love-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ff4081;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4081;
            transition: transform 0.1s ease;
        }

        .love-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ff4081;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4
